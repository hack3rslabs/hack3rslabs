<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="50%" style="stop-color:#0d0730"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="120" fill="url(#tbg)" rx="10"/>
  <!-- Terminal top bar -->
  <rect x="0" y="0" width="900" height="28" fill="#1e1060" rx="10"/>
  <rect x="0" y="18" width="900" height="10" fill="#1e1060"/>
  <!-- Window buttons -->
  <circle cx="20" cy="14" r="5" fill="#ef4444"/>
  <circle cx="38" cy="14" r="5" fill="#f59e0b"/>
  <circle cx="56" cy="14" r="5" fill="#22c55e"/>
  <!-- Title -->
  <text x="450" y="18" text-anchor="middle" font-size="10" fill="#c4b5fd" font-family="monospace">hack3rslabs — cloud-security-terminal</text>

  <!-- Terminal lines -->
  <text x="20" y="48" font-size="11" fill="#6d28d9" font-family="monospace">purushottam@hack3rslabs:~$</text>
  <text x="240" y="48" font-size="11" fill="#22c55e" font-family="monospace" filter="url(#tglow)">
    terraform apply --target=azure_aks_cluster
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
  </text>

  <text x="20" y="66" font-size="11" fill="#a855f7" font-family="monospace" opacity="0">
    ✓  Securing cluster with AZ-500 policies...
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/>
  </text>

  <text x="20" y="84" font-size="11" fill="#6d28d9" font-family="monospace" opacity="0">
    purushottam@hack3rslabs:~$
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.5s" fill="freeze"/>
  </text>
  <text x="240" y="84" font-size="11" fill="#22c55e" font-family="monospace" opacity="0" filter="url(#tglow)">
    kubectl apply -f devsecops-pipeline.yaml
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.5s" fill="freeze"/>
  </text>

  <text x="20" y="102" font-size="11" fill="#f59e0b" font-family="monospace" opacity="0">
    ✓  CI/CD pipeline deployed  |  AKS nodes: healthy  |  Security score: A+
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.5s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="108" width="8" height="2" fill="#a855f7" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" dur="1s" begin="4s" repeatCount="indefinite"/>
  </rect>
</svg>
